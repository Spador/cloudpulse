name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_apply:
        description: "Skip terraform apply (plan only)"
        required: false
        default: "false"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build React app
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ""  # Set per-environment if needed

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudpulse/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -input=false \
            -no-color

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate -no-color

      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan \
            -out=tfplan \
            -no-color \
            -input=false \
            | tee plan-output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            infra/tfplan
            infra/plan-output.txt
          retention-days: 30

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production  # Requires manual approval in GitHub repo settings

    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.inputs.skip_apply != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudpulse/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -input=false \
            -no-color

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infra/

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve -no-color tfplan

  deploy-lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package Lambda function
        run: |
          mkdir -p lambda_package
          pip install -r backend/requirements.txt -t lambda_package/
          cp execution/snapshot_costs.py lambda_package/
          cd lambda_package && zip -r ../cloudpulse-poller.zip .

      - name: Upload Lambda package to S3
        run: |
          BUCKET=$(aws cloudformation list-exports \
            --query "Exports[?Name=='cloudpulse-lambda-bucket'].Value" \
            --output text 2>/dev/null || echo "")
          if [ -n "$BUCKET" ]; then
            aws s3 cp cloudpulse-poller.zip s3://$BUCKET/cloudpulse-poller.zip
            aws lambda update-function-code \
              --function-name cloudpulse-poller \
              --s3-bucket $BUCKET \
              --s3-key cloudpulse-poller.zip \
              --no-cli-pager
            echo "Lambda updated successfully"
          else
            echo "Lambda bucket not found — skipping Lambda deploy"
          fi

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
